services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: eyewear_app
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: eyewear_db
      DB_USER: eyewear_user
      DB_PASS: eyewear_pass
    depends_on:
      - db
    volumes:
      - ./public:/var/www/html:Z
    restart: unless-stopped

  db:
    image: docker.io/library/mysql:8.0
    container_name: eyewear_db
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: eyewear_db
      MYSQL_USER: eyewear_user
      MYSQL_PASSWORD: eyewear_pass
    ports:
      - "3306:3306"
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro,Z
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_data:
